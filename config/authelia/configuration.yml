    ## CORS para que los frontends SPA puedan llamar al token endpoint
    cors:
      endpoints:
        - 'authorization'
        - 'token'
        - 'revocation'
        - 'userinfo'
        - 'introspection'
      allowed_origins_from_client_redirect_uris: true

    ## Duracion de los tokens
    lifespans:
      access_token: '1 hour'
      authorize_code: '1 minute'
      id_token: '1 hour'
      refresh_token: '90 minutes'

    ## Politicas por cliente OIDC para controlar acceso por usuario/grupo
    authorization_policies:
      frontend_config_policy:
        default_policy: 'deny'
        rules:
          - policy: 'one_factor'
            subject:
              - 'group:frontend-configuracion'
      frontend_gestion_pre_policy:
        default_policy: 'deny'
        rules:
          - policy: 'one_factor'
            subject:
              - 'group:frontend-gestion-pre'

    ## Clientes OIDC registrados (frontends SPA — flujo Authorization Code + PKCE)
    clients:
      ## ─── Frontend Configuracion Eleccion (puerto 5173) ────────────────
      - client_id: 'frontend-configuracion'
        client_name: 'Frontend Configuracion Eleccion'
        ## Cliente publico (SPA) — usa PKCE, sin client_secret
        public: true
        authorization_policy: 'frontend_config_policy'
        redirect_uris:
          - 'https://eleccion.sello-legitimo.site/callback'
          - 'https://preeleccion.sello-legitimo.site/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        response_types:
          - 'code'
        grant_types:
          - 'authorization_code'
        pkce_challenge_method: 'S256'
        access_token_signed_response_alg: 'RS256'
        id_token_signed_response_alg: 'RS256'
        token_endpoint_auth_method: 'none'
        consent_mode: 'implicit'

      ## ─── Frontend Gestion Pre-Electoral (puerto 5174) ─────────────────
      - client_id: 'frontend-gestion-pre'
        client_name: 'Frontend Gestion Pre-Electoral'
        public: true
        authorization_policy: 'frontend_gestion_pre_policy'
        redirect_uris:
          - 'http://localhost:5174/callback'
        scopes:
          - 'openid'
          - 'profile'
          - 'email'
          - 'groups'
        response_types:
          - 'code'
        grant_types:
          - 'authorization_code'
        pkce_challenge_method: 'S256'
        access_token_signed_response_alg: 'RS256'
        id_token_signed_response_alg: 'RS256'
        token_endpoint_auth_method: 'none'
        consent_mode: 'implicit'
