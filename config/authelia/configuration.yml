# yamllint disable rule:comments-indentation
---


## Tema de la interfaz de Authelia: light, dark, grey, auto.
theme: 'light'

##
## Servidor
##
server:
  address: 'tcp://:9091/'
  tls:
    key: '/config/certs/server.key'
    certificate: '/config/certs/server.crt'

##
## Logs
##
log:
  level: 'info'
  format: 'text'

##
## TOTP (autenticacion de dos factores) — deshabilitado para un solo factor
##
totp:
  disable: true

##
## Validacion de identidad
##
identity_validation:
  reset_password:
    jwt_secret: 'CAMBIAR_EN_PRODUCCION_jwt_reset_password_secreto_minimo_32_chars'

##
## Backend de autenticacion — base de datos de usuarios en archivo local
##
authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2id'
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
      salt_length: 16

##
## Control de acceso
##
access_control:
  default_policy: 'deny'
  rules:
    ## Todos los usuarios autenticados con un factor tienen acceso
    - domain: 'localhost'
      policy: 'one_factor'
    - domain: '*'
      policy: 'one_factor'

##
## Sesion
##
session:
  secret: 'CAMBIAR_EN_PRODUCCION_secreto_sesion_minimo_64_caracteres_aqui_0000'
  cookies:
    - name: 'authelia_session'
      domain: '127.0.0.1'
      authelia_url: 'https://auth.sello-legitimo.site'
      expiration: '1 hour'
      inactivity: '30 minutes'
  redis:
    host: 'authelia-redis'
    port: 6379

##
## Regulacion — proteccion ante fuerza bruta
##
regulation:
  max_retries: 5
  find_time: '2 minutes'
  ban_time: '10 minutes'

##
## Almacenamiento
##
storage:
  encryption_key: 'CAMBIAR_EN_PRODUCCION_clave_cifrado_almacenamiento_32_chars_00'
  local:
    path: '/config/db.sqlite3'



##
## Notificador — archivo local para desarrollo (sin SMTP)
##
notifier:
  disable_startup_check: true
  filesystem:
    filename: '/config/notification.txt'

##
## Proveedores de identidad — OpenID Connect (OIDC)
##
