server:
  address: 'tcp://0.0.0.0:9091'
  endpoints:
    authz:
      forward-auth:
        implementation: 'ForwardAuth'

log:
  level: 'info'

authentication_backend:
  file:
    path: '/config/users_database.yml'
    password:
      algorithm: 'argon2'
      argon2:
        variant: 'argon2id'
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

access_control:
  default_policy: 'deny'
  rules:
    - domain: '*.sello-legitimo.site'
      subject: 'group:admin'
      policy: 'two_factor'
    - domain: ['eleccion.sello-legitimo.site', 'preeleccion.sello-legitimo.site']
      policy: 'one_factor'

session:
  secret: '0f59c7b2215a1436be06e590cac17aa4e6d686ebd8f99a9ec16d8555cfa1ea9923eafa752e64eaa37639892a9c45e3dfaf246bc57907930c6175d81ea952cb09'
  cookies:
      - domain: 'sello-legitimo.site'
        authelia_url: 'https://auth.sello-legitimo.site'
        default_redirection_url: 'https://registraduria.sello-legitimo.site'

storage:
  encryption_key: 'e3969e04350c169b1bf4ad7cd786b814c5003c317ba726879400fc6388f78edb'
  local:
    path: '/config/db.sqlite3'

notifier:
  filesystem:
    filename: '/config/emails.txt'
  
identity_validation:
  reset_password:
    jwt_secret: '8536ba492aebd4e3164c1bbf3556cd5e0730ce3e1144e1a4d188698e1201889e1d600b8cf4d1495b19cb266e4261a2d392acc4d4ad58644df1eda1d968d163ae'
    jwt_lifespan: '5 minutes'
    jwt_algorithm: 'HS256'