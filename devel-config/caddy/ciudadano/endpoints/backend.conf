# Citizens Service
@citizen_match {
    path /api/v1/citizen /api/v1/citizen/*
}

handle @citizen_match {
    reverse_proxy citizen-query-service:8081
}

# Results Service
@results_match {
    path /api/v1/results /api/v1/results/*
}

handle @results_match {
    reverse_proxy results-service:8083
}

# Elections Service
@elections_match {
    path /api/v1/elections /api/v1/elections/*
}

handle @elections_match {
    reverse_proxy elections-query-service:8082
}

# Transparency Service
@transparency_match {
    path /api/v1/transparency /api/v1/transparency/*
}

handle @transparency_match {
    reverse_proxy transparency-service:8084
}

# Dashboards Rol Service
@dashboard_match {
    path /api/v1/dashboard /api/v1/dashboard/*
}

handle @dashboard_match {
    reverse_proxy dashboards-rol-service:8085
}
