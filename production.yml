services:
    # Gateway
    gateway:
        image: caddy:latest
        ports:
            - 8181:80
        volumes:
            - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile
        networks:
            - sello-net
        deploy:
            restart_policy:
                condition: any
            placement:
                constraints:
                  - node.role == manager
            resources:
                limits:
                    cpus: "0.50"   # half a CPU core
                    memory: 512M

    ngrok:
        image: ngrok/ngrok:latest
        environment:
            NGROK_AUTHTOKEN: ${GATEWAY_NGROK_AUTHTOKEN}
        command:
            - "http"
            - "gateway:80"
        networks:
            - sello-net
        deploy:
            restart_policy:
                condition: any
            placement:
                constraints:
                - node.role == manager
    
    keycloak-db:
        image: postgres:14
        environment:
            POSTGRES_DB: ${KEYCLOAK_DB}
            POSTGRES_USER: ${KEYCLOAK_USERNAME}
            POSTGRES_PASSWORD: ${KEYCLOAK_PASSWORD}
        volumes:
            - keycloak_data:/var/lib/postgresql/data
        networks:
            - sello-net
        deploy:
            restart_policy:
                condition: any
            placement:
                constraints:
                - node.role == manager

    keycloak:
        image: quay.io/keycloak/keycloak:latest
        command: start-dev
        environment:
            KC_DB: ${KEYCLOAK_DB}
            KC_DB_URL_HOST: ${KEYCLOAK_URL_HOST}
            KC_DB_URL_DATABASE: keycloak-db
            KC_DB_USERNAME: ${KEYCLOAK_USERNAME}
            KC_DB_PASSWORD: ${KEYCLOAK_PASSWORD}
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
        networks:
            - sello-net
        deploy:
            restart_policy:
                condition: any
            placement:
                constraints:
                - node.role == manager

    # Frontend
    frontend:
        image: ghcr.io/at-sovereign-technologies/sello-legitimo-frontend:latest
        networks:
            - sello-net
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == frontend
    
    # Citizens Query
    citizen-query-service:
        image: ghcr.io/at-sovereign-technologies/citizen-query-service:latest
        environment:
            PORT: 8080
            DB_URL: jdbc:postgresql://citizen-query-postgres:5432/${CITIZENS_QUERY_DB_NAME}
            DB_USER: ${CITIZENS_QUERY_DB_USER}
            DB_PASSWORD: ${CITIZENS_QUERY_DB_PASSWORD}
            REDIS_HOST: citizens-query-redis
            REDIS_PORT: 6379
        networks:
            - sello-net
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == microservices

    citizen-query-postgres:
        image: postgres:14
        environment:
            POSTGRES_DB: ${CITIZENS_QUERY_DB_NAME}
            POSTGRES_USER: ${CITIZENS_QUERY_DB_USER}
            POSTGRES_PASSWORD: ${CITIZENS_QUERY_DB_PASSWORD}
        volumes:
            - citizen_query_data:/var/lib/postgresql/data
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    citizens-query-redis:
        image: redis:latest
        command: redis-server --appendonly yes
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    # Results Service
    results-service:
        image: ghcr.io/at-sovereign-technologies/results-service:latest
        environment:
            PORT: 8080
            DB_URL: jdbc:postgresql://results-postgres:5432/${RESULTS_SVC_DB_NAME}
            DB_USER: ${RESULTS_SVC_DB_USER}
            DB_PASSWORD: ${RESULTS_SVC_DB_PASSWORD}
            REDIS_HOST: results-redis
            REDIS_PORT: 6379
        networks:
            - sello-net
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == microservices

    results-postgres:
        image: postgres:14
        environment:
            POSTGRES_DB: ${RESULTS_SVC_DB_NAME}
            POSTGRES_USER: ${RESULTS_SVC_DB_USER}
            POSTGRES_PASSWORD: ${RESULTS_SVC_DB_PASSWORD}
        volumes:
            - results_data:/var/lib/postgresql/data
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    results-redis:
        image: redis:latest
        command: redis-server --appendonly yes
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    # Elections Query
    elections-query-service:
        image: ghcr.io/at-sovereign-technologies/election-query-service:latest
        environment:
            PORT: 8080
            DB_URL: jdbc:postgresql://elections-query-postgres:5432/${ELECTIONS_QUERY_DB_NAME}
            DB_USER: ${ELECTIONS_QUERY_DB_USER}
            DB_PASSWORD: ${ELECTIONS_QUERY_DB_PASSWORD}
            REDIS_HOST: elections-query-redis
            REDIS_PORT: 6379
        networks:
            - sello-net
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == microservices

    elections-query-postgres:
        image: postgres:14
        environment:
            POSTGRES_DB: ${ELECTIONS_QUERY_DB_NAME}
            POSTGRES_USER: ${ELECTIONS_QUERY_DB_USER}
            POSTGRES_PASSWORD: ${ELECTIONS_QUERY_DB_PASSWORD}
        volumes:
            - elections_query_data:/var/lib/postgresql/data
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    elections-query-redis:
        image: redis:latest
        command: redis-server --appendonly yes
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    # Transparency Query
    transparency-service:
        image: ghcr.io/at-sovereign-technologies/transparency-service:latest
        environment:
            PORT: 8080
            DB_URL: jdbc:postgresql://transparency-postgres:5432/${TRANSPARENCY_SVC_DB_NAME}
            DB_USER: ${TRANSPARENCY_SVC_DB_USER}
            DB_PASSWORD: ${TRANSPARENCY_SVC_DB_PASSWORD}
            REDIS_HOST: transparency-redis
            REDIS_PORT: 6379
        networks:
            - sello-net
        deploy:
            replicas: 2
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == microservices

    transparency-postgres:
        image: postgres:14
        environment:
            POSTGRES_DB: ${TRANSPARENCY_SVC_DB_NAME}
            POSTGRES_USER: ${TRANSPARENCY_SVC_DB_USER}
            POSTGRES_PASSWORD: ${TRANSPARENCY_SVC_DB_PASSWORD}
        volumes:
            - transparency_data:/var/lib/postgresql/data
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage

    transparency-redis:
        image: redis:latest
        command: redis-server --appendonly yes
        networks:
            - sello-net
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
            placement:
                constraints:
                    - node.labels.type == storage
volumes:
  citizen_query_data:
  results_data:
  elections_query_data:
  transparency_data:

networks:
  sello-net:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: "1400"