services:

  gateway:
    image: caddy:2.8.4
    ports:
      - "8091:443"
    volumes:
      - ./config/caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sello-net

  frontend:
    build:
      context: ../sello-legitimo-frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - sello-net

  citizen-query-service:
    build:
      context: ../citizen-query-service
      dockerfile: Dockerfile
    container_name: citizen-query-service
    environment:
      DB_URL: jdbc:postgresql://citizen-postgres:5432/citizen_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: citizen-redis
      REDIS_PORT: 6379
    networks:
      - sello-net

  citizen-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: citizen_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - sello-net

  citizen-redis:
    image: redis:latest
    container_name: citizen-redis
    networks:
      - sello-net

  results-service:
    build:
      context: ../results-service
      dockerfile: Dockerfile
    container_name: results-service
    networks:
      - sello-net

  elections-query-service:
    build:
      context: ../election-query-service
      dockerfile: Dockerfile
    container_name: elections-query-service
    networks:
      - sello-net

  transparency-service:
    build:
      context: ../transparency-service
      dockerfile: Dockerfile
    container_name: transparency-service
    networks:
      - sello-net

volumes:
  caddy_data:
  caddy_config:

networks:
  sello-net:
